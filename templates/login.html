<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Вход — Конвейер копирования</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="login-wrap">
    <form class="login-card" method="post" action="/login{{ '?next=' + request.args.get('next') if request.args.get('next') else '' }}">
      <div class="brand" style="justify-content:center;margin-bottom:6px;">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 40 40" width="34" height="34">
            <circle cx="20" cy="20" r="18" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-dasharray="4 6"/>
            <circle cx="20" cy="20" r="6" fill="var(--accent)"/>
          </svg>
        </div>
        <h1 style="font-size:19px;margin:0;">Конвейер копирования</h1>
      </div>
      <p class="muted" style="text-align:center;margin:0 0 18px;">Введите ключ безопасности, чтобы продолжить</p>

      {% if error %}
      <div class="login-error">{{ error }}</div>
      {% endif %}

      <label class="field">
        <span>Ключ безопасности</span>
        <input type="password" name="api_key" placeholder="Вставьте ключ из консоли или secret.json" autofocus autocomplete="off">
      </label>

      <button class="btn btn-primary" type="submit" style="margin-top:14px;width:100%;">Войти</button>
      <p class="hint" style="margin-top:14px;">
        Ключ выводится в консоль при запуске сервера, а также хранится в файле
        <code>secret.json</code> рядом со скриптом.
      </p>
    </form>
  </div>
</body>
</html>
